<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公共と人 — 穴埋めクイズ</title>
  <meta name="description" content="第1章「公共と人」の穴埋め学習クイズ。穴を押して答えを確認。">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header id="app-header">
  <span id="header-title">公共と人</span>

  <div class="tab-group" role="tablist">
    <button id="tab-quiz" class="tab-btn active" role="tab">穴埋め</button>
    <button id="tab-full" class="tab-btn"        role="tab">全文</button>
  </div>

  <div id="legend" aria-hidden="true">
    <span class="lbl-blank"></span>未解答
    <span class="lbl-correct"></span>正解
    <span class="lbl-wrong"></span>不正解
  </div>

  <span id="header-score">✓ 0　✗ 0　残 —</span>

  <button id="review-btn" disabled>復習</button>
  <button id="reset-btn">リセット</button>
</header>

<main id="main">
  <div id="content"></div>
</main>

<div id="score-bar" aria-hidden="true">
  <div id="score-bar-fill"></div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
